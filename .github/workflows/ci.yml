# .github/workflows/ci.yml
name: Guto CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Check formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Run Govulncheck (modern package)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

      - name: Run Tests with Coverage
        run: |
          go test -v -coverprofile=coverage.out ./cmd/...
          go tool cover -func=coverage.out

      - name: Check Coverage Threshold
        run: |
          head -1 coverage.out > coverage_filtered.out
          grep -v "^mode:" coverage.out | grep -v "/internal/" >> coverage_filtered.out
          COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current coverage (excluding internal/): $COVERAGE%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "❌ Coverage is below 75%"
            exit 1
          fi
        shell: bash

      - name: Verify Documentation
        run: |
          ls docs/CONTRIBUTING.md docs/LICENSE docs/SECURITY.md
